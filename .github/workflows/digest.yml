name: Gmail News Digest

on:
  schedule:
    - cron: '35 11 * * *'   # 8:35 AM Chile (UTC-3) — respaldo interno; cron-job.org dispara a las 8:30
  workflow_dispatch:         # disparado por cron-job.org a las 8:30 AM Chile (o manualmente)

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias
        run: npm install

      - name: Escribir archivo .env
        run: echo "$ENV_FILE" > .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Escribir credenciales OAuth2
        run: |
          mkdir -p credentials
          echo "$OAUTH_CREDENTIALS" > credentials/oauth2.json
        env:
          OAUTH_CREDENTIALS: ${{ secrets.OAUTH_CREDENTIALS }}

      - name: Escribir token OAuth2
        run: |
          mkdir -p tokens
          echo "$OAUTH_TOKEN" > tokens/token.json
        env:
          OAUTH_TOKEN: ${{ secrets.OAUTH_TOKEN }}

      - name: Ejecutar pipeline
        run: node src/index.js --run-now

      - name: Guardar last_run.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.json
          git diff --staged --quiet || git commit -m "chore: update last run timestamp"
          git push
