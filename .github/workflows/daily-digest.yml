name: Resumen Diario de Noticias

on:
  schedule:
    # 11:30 UTC = 8:30 AM hora Argentina (UTC-3, sin horario de verano)
    - cron: '30 11 * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde GitHub (útil para probar o reenviar)

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Escribir credenciales OAuth2
        env:
          OAUTH2_CREDENTIALS: ${{ secrets.OAUTH2_CREDENTIALS }}
          OAUTH2_TOKEN: ${{ secrets.OAUTH2_TOKEN }}
        run: |
          mkdir -p credentials tokens
          printf '%s' "$OAUTH2_CREDENTIALS" > credentials/oauth2.json
          printf '%s' "$OAUTH2_TOKEN"       > tokens/token.json
          echo "--- token.json escrito (primeros 50 chars):"
          head -c 50 tokens/token.json

      - name: Crear .env
        run: |
          printf 'GMAIL_LABEL=%s\nGMAIL_USER=%s\nDIGEST_RECIPIENT=%s\nGEMINI_API_KEY=%s\nSMTP_HOST=smtp.gmail.com\nSMTP_PORT=587\nSMTP_USER=%s\nSMTP_PASS=%s\nMAX_EMAILS_PER_RUN=30\nHOURS_LOOKBACK=24\n' \
            '${{ secrets.GMAIL_LABEL }}' \
            '${{ secrets.GMAIL_USER }}' \
            '${{ secrets.DIGEST_RECIPIENT }}' \
            '${{ secrets.GEMINI_API_KEY }}' \
            '${{ secrets.SMTP_USER }}' \
            '${{ secrets.SMTP_PASS }}' > .env

      - name: Ejecutar pipeline de noticias
        run: npm run now
